// Función para crear/actualizar equipo en categoría "Equipos de cliente"
function _guardarEquipoCliente(nombre, marca, modelo, serie){
  if(!nombre||!marca||!modelo) return null;
  const existe = (DB.equipos||[]).find(e=>e.esEquipoCliente && (
    (serie && e.serie && e.serie.trim()===serie.trim()) ||
    (e.clienteNombre===nombre && e.marca===marca && (e.modelo||e.desc)===modelo)
  ));
  if(existe){
    existe.clienteNombre = nombre; existe.marca = marca; existe.modelo = modelo; existe.serie = serie||existe.serie;
    const idx = DB.equipos.indexOf(existe);
    if(idx>=0 && window._fbDB && window._fbReady)
      window._fbDB.ref('montasa/equipos/'+idx).update({clienteNombre:nombre,marca,modelo,serie:serie||'',esEquipoCliente:true});
    return existe.id;
  }
  const nuevoEq = {id:uid(),codigo:serie||(marca+' '+modelo),desc:marca+' '+modelo+(nombre?' — '+nombre:''),tipo:'Equipos de cliente',esEquipoCliente:true,clienteNombre:nombre,marca,modelo,serie:serie||'',cliente:nombre,estado:'DISPONIBLE',combustible:'',ubicacion:nombre,horometro:'',observaciones:'Equipo de cliente'};
  if(!DB.equipos) DB.equipos=[];
  DB.equipos.push(nuevoEq);
  const newIdx = DB.equipos.length - 1;
  if(window._fbDB && window._fbReady)
    window._fbDB.ref('montasa/equipos/'+newIdx).set(nuevoEq);
  try{ localStorage.setItem(typeof LS_KEY!=='undefined'?LS_KEY:'montasa_v24', JSON.stringify(DB)); }catch(e){}
  return nuevoEq.id;
}

// ── SWIPE + KEYBOARD NAV ─────────────────────────────────────────────────
(function(){
  const TABS=['dashboard','preventivo','correctivo','historial'];
  let tx=0,ty=0,sl=false;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(sl) return;
    const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<50||Math.abs(dy)>80) return;
    if(e.target.closest('input,select,textarea,.card-body,.pin-overlay,.pin-box')) return;
    const active=document.querySelector('.section.active');
    if(!active) return;
    const cur=active.id.replace('tab-','');
    const idx=TABS.indexOf(cur); if(idx===-1) return;
    const next=dx<0?idx+1:idx-1;
    if(next<0||next>=TABS.length) return;
    sl=true;
    showTab(TABS[next],document.querySelector('.nav-btn:nth-child('+(next+1)+')'));
    setTimeout(()=>{sl=false;},400);
  },{passive:true});
  document.addEventListener('keydown',e=>{
    const overlay=document.getElementById('pin-overlay');
    if(overlay&&overlay.classList.contains('open')){
      if(e.key>='0'&&e.key<='9'){e.preventDefault();pinKey(e.key);}
      else if(e.key==='Backspace'){e.preventDefault();pinBorrar();}
      else if(e.key==='Escape'){e.preventDefault();pinCancelar();}
      return;
    }
    if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
    const active=document.querySelector('.section.active');
    if(!active) return;
    const cur=active.id.replace('tab-','');
    const idx=TABS.indexOf(cur); if(idx===-1) return;
    if(e.key==='ArrowRight'){const n=idx+1;if(n<TABS.length) showTab(TABS[n],document.querySelector('.nav-btn:nth-child('+(n+1)+')'));}
    if(e.key==='ArrowLeft') {const n=idx-1;if(n>=0)         showTab(TABS[n],document.querySelector('.nav-btn:nth-child('+(n+1)+')'));}
  });
})();

function guardarRevision(){
  const estado    = document.getElementById('rev-estado').value;
  const ubicacion = document.getElementById('rev-ubicacion')?.value || 'campo';
  const tec1      = document.getElementById('rev-tec1').value;
  const tec2      = document.getElementById('rev-tec2').value;
  const desc      = (document.getElementById('rev-desc')?.value||'').trim();
  const fecha     = document.getElementById('rev-fecha')?.value||'';
  const horaIni   = document.getElementById('rev-hora-ini')?.value||'';
  const horaFin   = document.getElementById('rev-hora-fin')?.value||'';
  const placa     = document.getElementById('rev-placa')?.value.trim()||'';
  const tipoVeh   = document.getElementById('rev-tipo-vehiculo')?.value||'';
  const kmSal     = document.getElementById('rev-km-sal')?.value||'';
  const kmRet     = document.getElementById('rev-km-ret')?.value||'';
  const faltantes = [];
  if(!tec1) faltantes.push('Técnico asignado');
  if(!desc) faltantes.push('Descripción');
  if(ubicacion !== 'plantel'){
    if(!kmSal) faltantes.push('Km salida');
    if(!kmRet) faltantes.push('Km retorno');
  }
  if(faltantes.length){ alert('Faltan:\n• '+faltantes.join('\n• ')); return; }
  if(!DB.revisiones) DB.revisiones = [];
  const nRev = (DB.revisiones.length||0)+1;
  const correlativo = 'RV-'+(nRev<10?'000':nRev<100?'00':nRev<1000?'0':'')+nRev;
  const entry = {
    id: uid(), correlativo, estado, ubicacion,
    tecnicos: [tec1, tec2].filter(Boolean),
    notas: desc, fecha, horaIni, horaFin,
    fechaInicio: fecha&&horaIni ? fecha+'T'+horaIni : fecha,
    fechaFin: fecha&&horaFin ? fecha+'T'+horaFin : fecha,
    placa, tipoVehiculo: tipoVeh,
    kmSalida: kmSal, kmRetorno: kmRet,
    completado: estado==='Completado'
  };
  DB.revisiones.push(entry);
  saveDB();
  if(window._fbDB && window._fbReady)
    window._fbDB.ref('montasa/revisiones').set(DB.revisiones);
  ['rev-placa','rev-hora-ini','rev-hora-fin','rev-fecha'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('rev-estado').selectedIndex=0;
  document.getElementById('rev-tec1').selectedIndex=0;
  document.getElementById('rev-tec2').selectedIndex=0;
  document.getElementById('rev-tipo-vehiculo').selectedIndex=0;
  toggleForm('form-rev');
  renderRevisiones();
  toast('Revisión guardada ✓');
}

function finalizarRevision(id){
  const r = (DB.revisiones||[]).find(x=>x.id===id);
  if(!r){ toast('Orden no encontrada'); return; }
  const faltantes = [];
  if(!(r.tecnicos&&r.tecnicos[0])) faltantes.push('Técnico 1');
  if(!r.fecha) faltantes.push('Fecha inicio');
  if(!r.horaIni) faltantes.push('Hora inicio');
  if(!r.horaFin) faltantes.push('Hora final');
  if(!r.placa) faltantes.push('Placa del vehículo');
  if(!r.tipoVehiculo) faltantes.push('Tipo de vehículo');
  if(!r.notas) faltantes.push('Descripción / Notas');
  if(!r.largo) faltantes.push('Largo (mts)');
  if(!r.ancho) faltantes.push('Ancho (mts)');
  if(!r.alto) faltantes.push('Alto (mts)');
  if(!r.ejeUnoDos) faltantes.push('Distancia entre eje 1-2 (mts)');
  if((r.ubicacion||'campo')!=='plantel'){
    if(!r.kmSalida)  faltantes.push('Km salida');
    if(!r.kmRetorno) faltantes.push('Km retorno');
  }
  if(faltantes.length){ alert('No se puede finalizar.\nFaltan:\n\n• '+faltantes.join('\n• ')); return; }
  r.estado = 'Completado';
  r.completado = true;
  r.fechaCierre = new Date().toISOString().slice(0,10);
  saveDB();
  renderRevisiones();
  renderHistorial();
  toast('Revisión ' + (r.correlativo||'') + ' finalizada ✓');
}
function guardarEvaluacion(){
  const estado    = document.getElementById('eval-estado').value;

  const tec1      = document.getElementById('eval-tec1').value;
  const tec2      = document.getElementById('eval-tec2').value;
  const fecha     = document.getElementById('eval-fecha').value;
  const horaIni   = document.getElementById('eval-hora-ini').value;
  const horaFin   = document.getElementById('eval-hora-fin').value;
  const kmSal     = document.getElementById('eval-km-sal').value;
  const kmRet     = document.getElementById('eval-km-ret').value;
  const tipoEq    = document.getElementById('eval-tipo-equipo').value;
  const modelo    = document.getElementById('eval-modelo').value.trim();
  const serie     = document.getElementById('eval-serie').value.trim();
  const horometro = document.getElementById('eval-horometro').value.trim();
  const cliente   = document.getElementById('eval-cliente').value.trim();
  const diag      = (document.getElementById('eval-diagnostico')?.value||document.getElementById('eval-desc')?.value||'').trim();
  const firma     = getFirmaData('firma-eval-new');
  const faltantes = [];
  if(!tec1) faltantes.push('Técnico asignado');
  if(!diag) faltantes.push('Diagnóstico / Descripción');
  if(!horometro) faltantes.push('Horómetro del equipo');
  if(ubicacion !== 'plantel'){
    if(!kmSal) faltantes.push('Km salida');
    if(!kmRet) faltantes.push('Km retorno');
  }
  if(faltantes.length){ alert('Faltan:\n• '+faltantes.join('\n• ')); return; }
  if(!DB.evaluaciones) DB.evaluaciones = [];
  const nEval = (DB.evaluaciones.length||0)+1;
  const correlativo = 'EV-'+(nEval<10?'000':nEval<100?'00':nEval<1000?'0':'')+nEval;
  const entry = {
    id: uid(), correlativo, estado, ubicacion,
    tecnicos: [tec1, tec2].filter(Boolean),
    fecha, horaIni, horaFin,
    fechaInicio: fecha+'T'+horaIni, fechaFin: fecha+'T'+horaFin,

  };

  ['eval-modelo','eval-serie','eval-horometro','eval-cliente','eval-diagnostico','eval-hora-ini','eval-hora-fin','eval-fecha','eval-km-sal','eval-km-ret'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });

  document.getElementById('eval-tipo-equipo').selectedIndex=0;

  const v = (DB.evaluaciones||[]).find(x=>x.id===id);

  const fc = document.getElementById('firma-eval-'+id);
  const firmaOk = (fc && fc.classList.contains('firmado')) || v.firma;

  if(!v.horaIni) faltantes.push('Hora inicio');

  if(!v.modelo) faltantes.push('Modelo');
  if(!v.marca) faltantes.push('Marca');

function agregarFotosOrden(tipo, id, input){
  const arr = tipo==='rev' ? DB.revisiones : DB.evaluaciones;
  const orden = (arr||[]).find(x=>x.id===id);
  if(!orden) return;
  if(!orden.fotos) orden.fotos = [];
  const archivos = Array.from(input.files);
  const espacio = 10 - orden.fotos.length;
  const procesar = archivos.slice(0, espacio);
  let pendientes = procesar.length;
  if(!pendientes){ toast('Límite de 10 fotos alcanzado'); return; }
  procesar.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      // Comprimir la imagen antes de guardar
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        const MAX = 1200;
        let w = img.width, h = img.height;
        if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
        if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        orden.fotos.push(canvas.toDataURL('image/jpeg', 0.75));
        pendientes--;
        if(pendientes === 0){
          saveDB();
          if(tipo==='rev') renderRevisiones(); else renderEvaluaciones();
          toast('Foto'+(procesar.length>1?'s':'')+' agregada'+(procesar.length>1?'s':'')+'  ✓');
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function eliminarFotoOrden(tipo, id, idx){
  if(!confirm('¿Eliminar esta foto?')) return;
  const arr = tipo==='rev' ? DB.revisiones : DB.evaluaciones;

  };
  set('badge-prev', prev);
  set('badge-corr', corr);
  set('badge-rev',  rev);
  set('badge-eval', eval_);
}


function _renderFotosOrden(fotos){
  if(!fotos||!fotos.length) return '';
  var h = '<div style="margin-top:10px"><div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">\ud83d\udcf7 Fotograf\u00edas ('+fotos.length+')</div><div style="display:flex;flex-wrap:wrap;gap:8px">';
  fotos.forEach(function(f){
    h += '<div style="width:80px;height:80px;border-radius:8px;overflow:hidden;cursor:zoom-in;flex-shrink:0" onclick="event.stopPropagation();_verFotoGrande(this.querySelector(\'img\').src)"><img src="'+f+'" style="width:100%;height:100%;object-fit:cover"></div>';
  });
  h += '</div></div>';
  return h;
}
function _verFotoGrande(src){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:99999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  overlay.innerHTML = '<img src="'+src+'" style="max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px">';
  overlay.onclick = ()=>overlay.remove();
  document.body.appendChild(overlay);
}
</script>

<div id="vale-overlay" style="display:none"></div>
<div id="viaticos-overlay" style="display:none"></div>
